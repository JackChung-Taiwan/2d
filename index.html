<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>翊華補習班：程式地獄對戰大魔王黑傑克</title>
    <style>
        :root {
            --term-green: #0f0;
            --term-dark: #051505;
            --boss-red: #ff003c;
            --hp-bg: #222;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0; background-color: #000; color: var(--term-green);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; user-select: none; -webkit-user-select: none;
        }

        /* CRT 螢幕掃描線特效 */
        #crt-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%; z-index: 999; pointer-events: none;
            opacity: 0.6;
        }

        #game-container {
            width: 100vw; height: 100vh; display: flex; flex-direction: column;
            background: radial-gradient(circle, #1a2a22 0%, #000000 80%);
            padding: 20px;
        }

        /* --- 前言故事區 --- */
        #prologue-arena {
            flex: 1; display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; border: 2px solid var(--term-green);
        }
        #prologue-image {
            max-width: 90%; max-height: 90%; object-fit: contain;
            transition: opacity 1s ease-in-out, filter 1s ease-in-out;
        }

        /* --- 戰鬥區 --- */
        #arena {
            display: none; flex: 1; justify-content: space-between; align-items: center;
            padding: 0 5%; position: relative;
        }

        .entity {
            display: flex; flex-direction: column; align-items: center; width: 300px;
            position: relative;
        }

        .sprite-container { position: relative; height: 250px; display: flex; align-items: flex-end;}
        
        .sprite-container img {
            width: 200px; object-fit: contain; 
            filter: drop-shadow(0 0 10px rgba(0,255,0,0.3));
        }

        #player-sprite { transform: scaleX(-1); }
        #boss-sprite { filter: drop-shadow(0 0 20px var(--boss-red)); width: 250px; }

        /* 血條 UI */
        .status-box {
            width: 100%; border: 2px solid var(--term-green); background: rgba(0,20,0,0.8);
            padding: 10px; margin-bottom: 15px; box-shadow: 0 0 10px rgba(0,255,0,0.2);
        }
        #boss-status { border-color: var(--boss-red); color: var(--boss-red); box-shadow: 0 0 10px rgba(255,0,0,0.2); }

        .name-row { font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .hp-bar-bg { width: 100%; height: 15px; background: var(--hp-bg); border: 1px solid currentColor; margin-top: 5px;}
        .hp-bar-fill { height: 100%; transition: width 0.3s ease-out, background-color 0.3s; }
        
        #player-hp-fill { background: var(--term-green); }
        #boss-hp-fill { background: var(--boss-red); }

        /* --- 終端機文字框與 RWD 指令區 --- */
        #terminal-box {
            height: 250px; border: 3px solid var(--term-green); border-radius: 5px;
            background: rgba(0, 0, 0, 0.9); padding: 15px;
            font-size: 1.1rem; line-height: 1.6; text-shadow: 0 0 5px var(--term-green);
            display: flex; flex-direction: column; position: relative;
        }
        
        #text-content { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        
        #command-panel {
            display: none; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 10px; border-top: 1px dashed var(--term-green); padding-top: 10px;
        }
        .cmd-btn {
            background: rgba(0, 20, 0, 0.8); color: var(--term-green); border: 1px solid var(--term-green);
            padding: 8px 10px; font-family: inherit; font-size: 0.95rem; cursor: pointer; font-weight: bold;
            transition: all 0.2s; text-align: left;
        }
        .cmd-btn:hover:not(:disabled) { background: var(--term-green); color: #000; }
        .cmd-btn:disabled { opacity: 0.4; cursor: not-allowed; border-color: #555; color: #555; background: transparent; }

        /* 動畫區 */
        @keyframes dash-right { 0% { transform: translateX(0) scaleX(-1); } 50% { transform: translateX(150px) scaleX(-1) scale(1.1); filter: drop-shadow(0 0 20px #0f0); } 100% { transform: translateX(0) scaleX(-1); } }
        @keyframes dash-left { 0% { transform: translateX(0) scaleX(-1); } 50% { transform: translateX(-150px) scaleX(-1) scale(1.1); filter: drop-shadow(0 0 30px #f00); } 100% { transform: translateX(0) scaleX(-1); } }
        @keyframes glitch-damage {
            0%, 100% { transform: translate(0,0); filter: brightness(1); }
            10% { transform: translate(-10px, 5px); filter: brightness(3) hue-rotate(90deg); }
            20% { transform: translate(10px, -5px) skewX(20deg); filter: invert(1); }
            30% { transform: translate(-5px, 10px); filter: brightness(0.5) sepia(1) hue-rotate(-50deg); }
            40% { transform: translate(10px, 5px) skewX(-20deg); filter: brightness(2); }
        }
        @keyframes delete-drop { 
            0% { filter: brightness(1); transform: scaleX(-1); }
            50% { filter: brightness(5) blur(5px); opacity: 0.8; transform: translateY(0) scaleX(-1); }
            100% { transform: translateY(150px); opacity: 0; filter: blur(10px) grayscale(1); transform: scaleX(-1); } 
        }

        /* RWD 手機版調整 */
        @media (max-width: 768px) {
            #game-container { padding: 10px; }
            #arena { flex-direction: column; justify-content: center; gap: 15px; }
            .entity { width: 100%; flex-direction: row; justify-content: space-between; align-items: center; }
            .sprite-container { height: 100px; }
            .sprite-container img { width: 90px; }
            #boss-sprite { width: 110px; }
            .status-box { width: 65%; margin-bottom: 0; padding: 5px; }
            .name-row { font-size: 1rem; }
            #terminal-box { height: 300px; font-size: 0.95rem; }
            
            #command-panel { grid-template-columns: 1fr 1fr; } /* 手機版按鈕 2x2 排列 */

            .entity:nth-child(1) { order: 2; }
            .entity:nth-child(2) { order: 1; }
            @keyframes dash-right { 0% { transform: translateY(0) scaleX(-1); } 50% { transform: translateY(-80px) scaleX(-1) scale(1.1); } 100% { transform: translateY(0) scaleX(-1); } }
            @keyframes dash-left { 0% { transform: translateY(0) scaleX(-1); } 50% { transform: translateY(80px) scaleX(-1) scale(1.1); } 100% { transform: translateY(0) scaleX(-1); } }
        }
    </style>
</head>
<body>
    <div id="crt-overlay"></div>

    <div id="game-container">
        <div id="prologue-arena"><img id="prologue-image" src="" alt="前言畫面"></div>

        <div id="arena">
            <div class="entity" id="player-entity">
                <div class="sprite-container"><img id="player-sprite" src="https://raw.githubusercontent.com/JackChung-Taiwan/2d/main/you" alt="學員"></div>
                <div class="status-box" id="player-status">
                    <div class="name-row"><span>翊華學員</span><span id="player-hp-text">150/150</span></div>
                    <div class="hp-bar-bg"><div class="hp-bar-fill" id="player-hp-fill" style="width: 100%;"></div></div>
                </div>
            </div>

            <div class="entity" id="boss-entity">
                <div class="status-box" id="boss-status">
                    <div class="name-row"><span>大魔王黑傑克</span><span id="boss-hp-text">9800/10000</span></div>
                    <div class="hp-bar-bg"><div class="hp-bar-fill" id="boss-hp-fill" style="width: 98%;"></div></div>
                </div>
                <div class="sprite-container"><img id="boss-sprite" src="https://raw.githubusercontent.com/JackChung-Taiwan/2d/main/jack" alt="黑傑克"></div>
            </div>
        </div>

        <div id="terminal-box">
            <div id="text-content"></div>
            <div id="command-panel">
                <button class="cmd-btn" id="btn-attack" disabled>> std::attack()</button>
                <button class="cmd-btn" id="btn-heavy" disabled>> sudo rm -rf /</button>
                <button class="cmd-btn" id="btn-stun" disabled>> Ctrl+C (中斷)</button>
                <button class="cmd-btn" id="btn-heal" disabled>> debug_heal()</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
